name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker image with both 'latest' and commit SHA tag
      - name: Build Docker image
        run: |
          IMAGE="nielmerzaaa/drcdraw"
          SHA_TAG="${{ github.sha }}"
          echo "Building Docker image: $IMAGE:latest and $IMAGE:$SHA_TAG"
          docker build -t "$IMAGE:latest" -t "$IMAGE:$SHA_TAG" .

      # 4️⃣ Push both tags
      - name: Push Docker image
        run: |
          IMAGE="nielmerzaaa/drcdraw"
          SHA_TAG="${{ github.sha }}"
          echo "Pushing Docker image: $IMAGE:latest"
          docker push "$IMAGE:latest"
          echo "Pushing Docker image: $IMAGE:$SHA_TAG"
          docker push "$IMAGE:$SHA_TAG"
